# Changed: keep an optional sweep template for auxiliary experiments only.
# Why: sweeps should tune retrieval/rule-threshold choices, not train on leaderboard labels.
program: tools/run_optional_sweep.py
method: grid
metric:
  name: public_accuracy
  goal: maximize
parameters:
  enable_llm_fallback:
    values: [false]
  short_read_payload_fail_threshold:
    values: [2, 4, 8]
  require_properties_payload:
    values: [true]
